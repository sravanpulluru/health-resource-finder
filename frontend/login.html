<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Health Resource Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #1d2b64, #f8cdda);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background-color: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .login-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1d2b64;
      text-align: center;
      margin-bottom: 10px;
    }

    .project-tagline {
      font-size: 0.95rem;
      color: #555;
      text-align: center;
      margin-bottom: 25px;
    }

    .btn-primary {
      background-color: #1d2b64;
      border: none;
    }

    .btn-primary:hover {
      background-color: #16225d;
    }

    #loginMessage {
      margin-top: 15px;
      text-align: center;
      color: #d9534f;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-title">Health Resource Finder</div>
    <div class="project-tagline">Admin Login Portal</div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label fw-semibold">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required />
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>
      <div id="loginMessage"></div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem("loggedIn", "true");
        window.location.href = 'index.html';
      } else {
        document.getElementById('loginMessage').innerText = '❌ Invalid credentials. Please try again.';
      }
    });
  </script>
</body>
</html>
