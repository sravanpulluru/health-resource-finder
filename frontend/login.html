<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Health Resource Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-dark text-light d-flex justify-content-center align-items-center" style="height: 100vh;">
  <div class="card p-4 bg-secondary" style="width: 100%; max-width: 400px;">
    <h3 class="text-center mb-3">🔐 Login</h3>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" class="form-control" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required />
      </div>
      <button class="btn btn-light w-100" type="submit">Login</button>
    </form>
    <div id="loginMessage" class="text-warning text-center mt-3"></div>
  </div>

  <!-- ✅ Corrected script tag -->
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // 🔐 Check hardcoded credentials
      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem("loggedIn", "true");
        window.location.href = 'index.html';
      } else {
        document.getElementById('loginMessage').innerText = 'Invalid credentials';
      }
    });
  </script>

</body>
</html>
