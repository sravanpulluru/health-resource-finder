<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blood Donor Finder & Feedback</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
    }

    .navbar {
      background-color: #000;
    }

    .navbar-brand {
      font-weight: bold;
      font-size: 1.5rem;
      color: #00d4ff !important;
    }

    .btn, .btn-outline-light, .btn-danger, .btn-primary {
      border-radius: 6px;
      font-weight: 500;
      color: #fff;
    }

    .btn-outline-light:hover {
      background-color: #00d4ff;
      color: #000;
    }

    .card {
      background-color: #1e1e2f;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
      color: #ffffff;
    }

    .form-label {
      color: #ffffff;
    }

    .form-control, .form-select {
      background-color: #000 !important;
      color: #ffffff !important;
      border: 1px solid #444;
    }

    .form-control::placeholder, textarea::placeholder {
      color: #aaa;
    }

    .alert, .border-bottom {
      background-color: #2c2c3e;
      border-color: #444;
      color: #ffffff;
    }
  </style>
</head>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<body>
  <!-- 🔗 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🩸 Blood Donor Finder</a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-light me-2">🏥 Health Finder</a>
        <a href="login.html" class="btn btn-outline-light">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <!-- 🔍 Donor Search Form -->
    <div class="card p-4 mb-4">
      <h4 class="mb-3">Search Blood Donors</h4>
      <form id="donorForm" class="row g-3">
        <div class="col-md-6">
          <label for="bloodGroup" class="form-label">Blood Group</label>
          <select id="bloodGroup" name="bloodGroup" class="form-select" required>
            <option value="">Select</option>
            <option>A+</option><option>A-</option>
            <option>B+</option><option>B-</option>
            <option>AB+</option><option>AB-</option>
            <option>O+</option><option>O-</option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="location" class="form-label">City</label>
          <input type="text" id="location" name="location" class="form-control" placeholder="Enter city" required />
        </div>
        <div class="col-12">
          <button class="btn btn-danger w-100" type="submit">🔍 Find Donors</button>
        </div>
      </form>
      <div id="donorResults" class="mt-4"></div>
    </div>

    <!-- 💬 Feedback Form -->
    <div class="card p-4 mb-4">
      <h4 class="mb-3">We value your feedback!</h4>
      <form id="feedbackForm">
        <div class="mb-3">
          <label for="name" class="form-label">Your Name</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required />
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Your Feedback</label>
          <textarea id="message" name="message" class="form-control" rows="4" placeholder="Share your thoughts..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">📩 Submit Feedback</button>
        <div id="feedbackMsg" class="mt-3"></div>
      </form>
    </div>

  </div>

  <script>
    document.getElementById('donorForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const bloodGroup = e.target.bloodGroup.value.trim();
      const location = e.target.location.value.trim();
      const resultsDiv = document.getElementById('donorResults');

      resultsDiv.innerHTML = '<div class="text-info">🔄 Searching...</div>';

      try {
        const res = await fetch(`http://localhost:5000/api/donors?bloodGroup=${encodeURIComponent(bloodGroup)}&location=${encodeURIComponent(location)}`);
        const data = await res.json();

        resultsDiv.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          resultsDiv.innerHTML = '<div class="alert alert-warning">No donors found.</div>';
          return;
        }

        data.forEach(donor => {
          resultsDiv.innerHTML += `
            <div class="border-bottom py-2 px-2 rounded mb-2">
              <strong>${donor.name}</strong> - ${donor.bloodGroup}<br />
              📍 ${donor.location} &nbsp; | &nbsp; ☎️ ${donor.contact}
            </div>
          `;
        });
      } catch (err) {
        console.error(err);
        resultsDiv.innerHTML = '<div class="alert alert-danger">Error fetching donor data.</div>';
      }
    });

    document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const payload = Object.fromEntries(formData.entries());

      try {
        const res = await fetch('http://localhost:5000/api/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();

        const msgDiv = document.getElementById('feedbackMsg');
        if (result.success) {
          msgDiv.innerHTML = '<div class="alert alert-success">✅ Feedback submitted!</div>';
          e.target.reset();
        } else {
          msgDiv.innerHTML = '<div class="alert alert-warning">❌ Failed to submit feedback.</div>';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('feedbackMsg').innerHTML = '<div class="alert alert-danger">❌ Error submitting feedback.</div>';
      }
    });
  </script>
</body>
</html>
