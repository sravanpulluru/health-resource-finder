<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Health Resource Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
    }

    .container, .card, .form-label, .form-control, .form-select, .card-title,
    .list-group-item, .alert, .form-control::placeholder, .form-select option {
      color: #ffffff !important;
    }

    .form-control, .form-select {
      background-color: #000 !important;
      border: 1px solid #444;
      color: #fff !important;
    }

    .form-control::placeholder {
      color: #aaa;
    }

    .navbar {
      background-color: #000 !important;
    }

    .navbar-brand {
      color: #00d4ff !important;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .card {
      background-color: #1e1e2f;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
    }

    .btn-outline-light, .btn-danger {
      font-weight: 500;
      border-radius: 6px;
    }

    .btn-outline-light:hover {
      background-color: #00d4ff;
      color: #000;
    }

    #map {
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .alert, .list-group-item {
      background-color: #2c2c3e;
      color: #f1f1f1;
      border-color: #444;
    }
  </style>
</head>

<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<body>
  <!-- 🌐 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">🩺 Health Resource Finder</a>
      <a class="btn btn-outline-light ms-auto" href="login.html">Logout</a>
    </div>
  </nav>

  <div class="container">

    <!-- 🏥 Health Resource Search -->
    <div class="card mb-4 p-4">
      <h4 class="card-title mb-3">Search Health Resources</h4>
      <form id="resourceForm" class="row g-3">
        <div class="col-md-6">
          <label for="location" class="form-label">Location</label>
          <input type="text" id="location" name="location" class="form-control" placeholder="Enter city or area" required />
        </div>
        <div class="col-md-6">
          <label for="type" class="form-label">Resource Type</label>
          <select id="type" name="type" class="form-select" required>
            <option value="">Select Type</option>
            <option value="Hospital">Hospital</option>
            <option value="Clinic">Clinic</option>
            <option value="Pharmacy">Pharmacy</option>
            <option value="Ambulance">Ambulance</option>
          </select>
        </div>
        <div class="col-12">
          <button class="btn btn-outline-light w-100" type="submit">🔍 Find Resources</button>
        </div>
      </form>
      <div id="resourceResults" class="mt-4"></div>
    </div>

    <!-- 🗺️ Map -->
    <div id="map" style="height: 400px;" class="mb-5 shadow-sm"></div>

    <!-- 🩸 Blood Donor Page Link -->
    <div class="card mb-4 p-4 text-center">
      <h4 class="card-title mb-3">Need Blood Donors or Want to Give Feedback?</h4>
      <a href="donors.html" class="btn btn-danger">🩸 Go to Blood Donor Finder</a>
    </div>

  </div>

  <!-- 📦 Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
