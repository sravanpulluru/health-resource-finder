<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Health & Blood Resource Finder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<script>
  if (!localStorage.getItem("loggedIn")) {
    window.location.href = "login.html";
  }
</script>

<body class="bg-dark text-light">
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-black shadow-sm mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">🩺 Health Resource Finder</a>
      <a class="btn btn-outline-light ms-auto" href="login.html">Logout</a>
    </div>
  </nav>

  <div class="container">
    <!-- Health Resource Search -->
    <div class="card bg-secondary text-light mb-4 p-4">
      <h4 class="card-title mb-3">Search Health Resources</h4>
      <form id="resourceForm" class="row g-3">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="location" class="form-label">Enter Location</label>
            <input type="text" class="form-control" id="location" name="location" required />
          </div>
          <div class="col-md-6 mb-3">
            <label for="type" class="form-label">Select Type</label>
            <select class="form-control" id="type" name="type" required>
              <option value="">Select type</option>
              <option value="Hospital">Hospital</option>
              <option value="Clinic">Clinic</option>
              <option value="Blood Donor">Blood Donor</option>
              <option value="Pharmacy">Pharmacy</option>
              <option value="Ambulance">Ambulance</option>
            </select>
          </div>
        </div>
        <div class="col-12">
          <button class="btn btn-outline-light w-100" type="submit">Find Resources</button>
        </div>
      </form>
      <div id="resourceResults" class="mt-4"></div>
    </div>

    <!-- Map -->
    <div id="map" style="height: 400px;" class="mt-4 rounded shadow"></div>

    <!-- Blood Donor Search -->
    <div class="card bg-secondary text-light mb-4 p-4">
      <h4 class="card-title mb-3">Find Blood Donors</h4>
      <form id="donorForm" class="row g-3">
        <div class="col-md-6">
          <input type="text" name="bloodGroup" placeholder="Enter blood group (e.g. A+, O-)" class="form-control" required />
        </div>
        <div class="col-md-6">
          <input type="text" name="city" placeholder="Enter city" class="form-control" required />
        </div>
        <div class="col-12">
          <button class="btn btn-danger w-100" type="submit">Find Donors</button>
        </div>
      </form>
      <div id="donorResults" class="mt-4"></div>
    </div>

    <!-- Feedback Section -->
    <div class="card bg-secondary text-light mb-4 p-4">
      <h4 class="card-title mb-3">Feedback</h4>
      <form id="feedbackForm" class="row g-3">
        <div class="col-md-6">
          <input type="text" name="name" placeholder="Your Name" class="form-control" required />
        </div>
        <div class="col-md-6">
          <input type="email" name="email" placeholder="Your Email" class="form-control" required />
        </div>
        <div class="col-12">
          <textarea name="message" placeholder="Your Feedback" class="form-control" rows="4" required></textarea>
        </div>
        <div class="col-12">
          <button class="btn btn-light w-100" type="submit">Submit Feedback</button>
        </div>
      </form>
      <div id="feedbackResponse" class="mt-3"></div>
    </div>
  </div>

 

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
